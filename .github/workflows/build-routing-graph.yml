name: Build Routing Graph

on:
  workflow_dispatch:
    inputs:
      region_id:
        description: 'Region ID (e.g. svizzera, italia)'
        required: true
      osm_url:
        description: 'URL of the .osm.pbf extract (from Geofabrik)'
        required: true
        default: 'https://download.geofabrik.de/europe/switzerland-latest.osm.pbf'
      release_tag:
        description: 'GitHub release tag for the output zip (e.g. routing-graph-svizzera-v2)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download OSM extract
        run: |
          curl -L -o region.osm.pbf "${{ github.event.inputs.osm_url }}"
          ls -lh region.osm.pbf

      - name: Build routing graph via Gradle
        run: |
          REGION_ID="${{ github.event.inputs.region_id }}"
          mkdir -p graph-builder/src/main/java
          cat > graph-builder/build.gradle << 'EOF'
          plugins { id 'java'; id 'application' }
          repositories { mavenCentral() }
          dependencies { implementation 'com.graphhopper:graphhopper-core:7.0' }
          application { mainClass = 'BuildGraph' }
          EOF
          cat > graph-builder/src/main/java/BuildGraph.java << 'JAVA'
          import com.graphhopper.GraphHopper;
          import com.graphhopper.config.Profile;
          public class BuildGraph {
              public static void main(String[] args) throws Exception {
                  Profile profile = new Profile("car").setVehicle("car").setWeighting("fastest");
                  GraphHopper gh = new GraphHopper();
                  gh.setOSMFile(args[0]);
                  gh.setGraphHopperLocation(args[1]);
                  gh.setProfiles(profile);
                  gh.setElevation(false);
                  gh.importOrLoad();
                  System.out.println("Graph built successfully.");
              }
          }
          JAVA
          cd graph-builder
          gradle -q run --args="../region.osm.pbf ../graph-${REGION_ID}"
          cd ..
          ls -lh "graph-${REGION_ID}/"

      - name: Zip graph
        run: |
          REGION_ID="${{ github.event.inputs.region_id }}"
          cd "graph-${REGION_ID}"
          zip -r "../graph-${REGION_ID}.zip" .
          cd ..
          ls -lh "graph-${REGION_ID}.zip"

      - name: Create GitHub Release and upload graph
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REGION_ID="${{ github.event.inputs.region_id }}"
          TAG="${{ github.event.inputs.release_tag }}"
          gh release create "$TAG" \
            --title "Routing graph: ${REGION_ID} (${TAG})" \
            --notes "Prebuilt GraphHopper 7.0 routing graph for ${REGION_ID} (car/fastest profile). Generated from ${{ github.event.inputs.osm_url }}." \
            "graph-${REGION_ID}.zip"
