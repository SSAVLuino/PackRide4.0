plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'de.topobyte:osm4j-core:1.2.0'
    implementation 'de.topobyte:osm4j-pbf:1.2.0'
    implementation 'org.xerial:sqlite-jdbc:3.45.1.0'
}

application {
    mainClass = 'BuildGeocodingDb'
}
