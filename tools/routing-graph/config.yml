# GraphHopper import config for prebuilt offline routing graphs.
# Must match the profile defined in RoutingManager.carProfile().
graphhopper:
  graph.flag_encoders: car
  profiles:
    - name: car
      vehicle: car
      weighting: custom
      custom_model:
        priority:
          - if: road_access == DESTINATION
            multiply_by: 0.1

  graph.elevation.provider: noop
  import.osm.ignored_highways: ""
